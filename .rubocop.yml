plugins:
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

# Message, Event, and Usage need real class bodies: constants and nested
# classes assigned inside a Data.define block land in the wrong scope.
Style/DataInheritance:
  Enabled: false

Style/EndlessMethod:
  EnforcedStyle: allow_single_line

Layout/LineLength:
  Max: 100

Metrics/MethodLength:
  Max: 40
  CountAsOne: [array, hash, heredoc]

Metrics/ClassLength:
  Max: 250
  CountAsOne: [array, hash, heredoc]

Metrics/ModuleLength:
  Max: 250
  CountAsOne: [array, hash, heredoc]

Metrics/AbcSize:
  Max: 48

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/PerceivedComplexity:
  Max: 12

Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/BlockLength:
  Exclude:
    - "test/**/*"

Naming/MethodParameterName:
  # The defaults plus ui, the tool result side-channel; as domain-real as id.
  AllowedNames: [as, at, by, cc, db, id, if, in, io, ip, of, on, os, pp, to, ui]
