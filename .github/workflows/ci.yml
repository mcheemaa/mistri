name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4", "head"]
    env:
      BUNDLE_WITHOUT: lint
      # One entry measures coverage and enforces the floor.
      COVERAGE: ${{ matrix.ruby == '3.4' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
      - uses: codecov/codecov-action@v7
        if: matrix.ruby == '3.4'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop
