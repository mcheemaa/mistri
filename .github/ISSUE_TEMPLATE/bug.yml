name: Bug report
description: Something behaves wrong
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you run, what did you expect, what happened instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Smallest reproduction
      description: Ideally a snippet using Mistri::Providers::Fake so it runs without keys.
      render: ruby
  - type: input
    id: version
    attributes:
      label: mistri and Ruby versions
      placeholder: mistri 0.1.0, ruby 3.4.2
    validations:
      required: true
